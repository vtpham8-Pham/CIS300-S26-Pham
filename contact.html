<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio of Vinh Pham showcasing projects, experience, and skills in software development and AI."
    />
    <meta
      name="keywords"
      content="portfolio, software developer, AI, machine learning, projects"
    />
    <meta name="author" content="Vinh Pham" />
    <title>Vinh Pham | Contact</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/png" href="images/favicon.png" />
  </head>

  <body>
    <!-- NAV -->
    <nav class="top-nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="experience.html">Experience</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a class="active" href="contact.html">Contact</a></li>
      </ul>
    </nav>

    <!-- SIDE ICONS -->
    <div class="side-icons">
      <a href="https://www.linkedin.com/in/vinhhphvm/" target="_blank">
        <img src="images/LinkedIn.svg" />
      </a>
      <a href="https://github.com/vinhhphvm" target="_blank">
        <img src="images/GitHub.svg" />
      </a>
      <a href="contact.html">
        <img src="images/email.png" />
      </a>
    </div>

    <main>
      <!-- HERO -->
      <section class="hero-split">
        <div class="hero-left">
          <h1>Contact</h1>
          <p>
            If you’d like to connect, collaborate, or learn more about my work,
            feel free to reach out via VinhPhamBiz@gmail.com
          </p>
        </div>

        <div class="hero-right">
          <h2>CONTACT</h2>
        </div>
      </section>

      <!-- FORM -->
      <section class="content-section fade-in">
        <form class="contact-form" action="#">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required />

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />

          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" required />

          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>

          <button type="submit">Send Message</button>
        </form>
      </section>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <p>© 2026 Vinh Pham</p>
    </footer>

    <!-- TRANSITION + SCROLL ANIMATION -->
    <script>
      document.querySelectorAll("a").forEach((link) => {
        link.addEventListener("click", function (e) {
          if (this.href && this.href.includes(".html")) {
            e.preventDefault();
            document.body.classList.add("fade-out");

            setTimeout(() => {
              window.location = this.href;
            }, 300);
          }
        });
      });

      const elements = document.querySelectorAll(".fade-in");

      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("show");
            }
          });
        },
        { threshold: 0.2 },
      );

      elements.forEach((el) => observer.observe(el));
    </script>
  </body>
</html>
